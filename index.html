<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <link rel="icon" href="data:," />
    <title>GigaPrompt Tower Defense</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0e14;
        font-family: ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, Consolas, monospace;
      }
      #app {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
      }
      #app canvas {
        display: block;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        touch-action: none;
      }
      #boot {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        color: #5fd7ff;
        letter-spacing: 2px;
        font-size: 14px;
        text-shadow: 0 0 8px rgba(95, 215, 255, 0.6);
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="boot">BOOTING GIGAPROMPT&hellip;</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
